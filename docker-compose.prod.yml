services:
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/anarchybay1-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/anarchybay1-backend:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:
